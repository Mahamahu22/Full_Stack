<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App (Open-Meteo)</title>
</head>
<body>
  <h1>Weather App (Open-Meteo)</h1>
  <input type="text" id="cityInput" placeholder="Enter city (e.g., London)" />
  <button onclick="getWeather()">Get Weather</button>
  <div id="weatherResult"></div>

  <script>
    async function getWeather() {
      const city = document.getElementById('cityInput').value;
      const geoUrl = 'https://geocoding-api.open-meteo.com/v1/search?name=${city}';

      try {
        const geoRes = await fetch(geoUrl);
        const geoData = await geoRes.json();

        if (!geoData.results || geoData.results.length === 0) {
          document.getElementById('weatherResult').innerText = "City not found.";
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];
        const weatherUrl = 'https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true';

        const weatherRes = await fetch(weatherUrl);
        const weatherData = await weatherRes.json();
        const weather = weatherData.current_weather;

        document.getElementById('weatherResult').innerHTML = `
          <h2>Weather in ${name}, ${country}</h2>
          <p>Temperature: ${weather.temperature}°C</p>
          <p>Wind Speed: ${weather.windspeed} km/h</p>
          <p>Condition Code: ${weather.weathercode}</p>
        `;
      } catch (error) {
        console.error(error);
        document.getElementById('weatherResult').innerText = "Error getting weather data.";
      }
    }
  </script>
</body>
</html>
